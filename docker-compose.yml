version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-CrimeIntel@2024!}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD:-CrimeIntel@2024!}", "-Q", "SELECT 1", "-No"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=CrimeIntel;User Id=sa;Password=${SA_PASSWORD:-CrimeIntel@2024!};TrustServerCertificate=true;
      - Elasticsearch__Uri=http://elasticsearch:9200
    depends_on:
      sqlserver:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  ingestion:
    build:
      context: ./python-services/ingestion
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SQL_SERVER=sqlserver
      - SQL_USER=sa
      - SQL_PASSWORD=${SA_PASSWORD:-CrimeIntel@2024!}
      - SQL_DATABASE=CrimeIntel
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - API_URL=http://api:5000
    depends_on:
      sqlserver:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  ml-service:
    build:
      context: ./python-services/ml-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_INGESTION_URL=http://localhost:8000
      - VITE_ML_URL=http://localhost:8001

volumes:
  sqlserver_data:
  elasticsearch_data:
